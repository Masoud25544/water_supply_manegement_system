<!-- templates/boss_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Boss Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1e3c72;
            font-weight: 700;
        }

        .form-control:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 0.2rem rgba(42, 82, 152, 0.25);
        }

        /* ===== PRIMARY BUTTON - SILVER METALLIC WITH 3D DEPTH ===== */
        .btn-primary {
            background: linear-gradient(145deg, #f9f9f9, #bfbfbf);
            color: #222;
            border: 1px solid #999;
            border-radius: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 14px 20px;
            text-shadow: 0 1px 0 #fff;
            box-shadow:
                inset 0 2px 3px rgba(255,255,255,0.8),
                inset 0 -3px 5px rgba(0,0,0,0.2),
                0 6px #888,
                0 8px 15px rgba(0,0,0,0.25);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, #ffffff, #d0d0d0);
            box-shadow:
                inset 0 2px 3px rgba(255,255,255,0.9),
                inset 0 -3px 5px rgba(0,0,0,0.25),
                0 6px #777,
                0 10px 18px rgba(0,0,0,0.3);
        }

        .btn-primary:active {
            transform: translateY(4px);
            box-shadow:
                inset 0 3px 5px rgba(0,0,0,0.3),
                inset 0 -1px 2px rgba(255,255,255,0.7),
                0 0 0 #888,
                0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-primary.loading {
            background: linear-gradient(145deg, #e0e0e0, #a6a6a6) !important;
            box-shadow:
                inset 0 2px 3px rgba(255,255,255,0.7),
                inset 0 -3px 5px rgba(0,0,0,0.3),
                0 4px #666,
                0 6px 12px rgba(0,0,0,0.25);
        }

        /* ===== SECONDARY BUTTON - COLORFUL METALLIC ===== */
        .btn-secondary {
            background: linear-gradient(145deg, #ffd700, #ffb800); /* Gold gradient */
            color: #222;
            border: 1px solid #b58f00;
            border-radius: 14px;
            font-weight: 600;
            padding: 14px 20px;
            text-shadow: 0 1px 0 #fff;
            box-shadow:
                inset 0 2px 3px rgba(255,255,255,0.6),
                inset 0 -3px 4px rgba(0,0,0,0.2),
                0 5px #b58f00,
                0 7px 12px rgba(0,0,0,0.25);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: linear-gradient(145deg, #ffe066, #ffc800);
            box-shadow:
                inset 0 2px 3px rgba(255,255,255,0.7),
                inset 0 -3px 4px rgba(0,0,0,0.25),
                0 6px #a47700,
                0 8px 15px rgba(0,0,0,0.3);
        }

        .btn-secondary:active {
            transform: translateY(3px);
            box-shadow:
                inset 0 3px 5px rgba(0,0,0,0.3),
                0 0 0 #a47700;
        }

        .alert {
            border-radius: 10px;
        }

        .spinner-border {
            width: 1rem;
            height: 1rem;
        }
    </style>
</head>
<body>

<div class="login-card">

    <h2>Boss Login</h2>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" id="loginForm">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" placeholder="Enter your username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
        </div>

        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
                <span id="btnText">Login</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none"></span>
            </button>

            <a href="{{ url_for('boss_signup') }}" class="btn btn-secondary btn-lg">Sign Up</a>
        </div>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const form = document.getElementById("loginForm");
    const button = document.getElementById("loginBtn");
    const btnText = document.getElementById("btnText");
    const spinner = document.getElementById("btnSpinner");

    form.addEventListener("submit", function() {
        button.disabled = true;
        button.classList.add("loading");
        btnText.textContent = "Logging in...";
        spinner.classList.remove("d-none");
    });
</script>

</body>
</html>
