<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        font-family: 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #f5f5f5;
    }
    .dashboard-card {
        background-color: rgba(255,255,255,0.05);
        backdrop-filter: blur(12px);
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        padding: 35px;
        max-width: 500px;
        width: 100%;
        text-align: center;
    }
    .dashboard-card h2 {
        font-weight: 700;
        font-size: 28px;
        margin-bottom: 20px;
        background: linear-gradient(90deg, #ff7e5f, #feb47b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .dashboard-info p {
        font-size: 15px;
        margin: 6px 0;
    }
    .btn-dashboard {
        display: block;
        width: 100%;
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 10px;
        margin-bottom: 12px;
        text-decoration: none;
        color: white;
        transition: 0.3s;
    }
    .btn-read {
        background: linear-gradient(90deg, #ff7e5f, #feb47b);
    }
    .btn-read:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255,126,95,0.4);
    }
    .btn-unread {
        background: linear-gradient(90deg, #6c63ff, #3a30e0);
    }
    .btn-unread:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(60,50,200,0.4);
    }
    .btn-logout {
        background: #dc3545;
    }
    .btn-logout:hover {
        background: #a71d2a;
    }
</style>
</head>
<body>

<div class="dashboard-card">
    <h2>Karibu {{ staff_name }}!</h2>

    <div class="dashboard-info mb-4">
        <p><strong>Role:</strong> {{ staff_role }}</p>
        <p><strong>Bosi ID:</strong> {{ staff_boss_id }}</p>
        <p><strong>Staff ID:</strong> {{ staff_id }}</p>
        <p><strong>Muda wa sasa:</strong> {{ current_time }}</p>
    </div>

    <!-- Buttons za Dashboard -->
    <a href="{{ url_for('read_meter') }}" class="btn-dashboard btn-read">📖 Soma Mita</a>
    <a href="{{ url_for('unread_meters') }}" class="btn-dashboard btn-unread">📋 Meters Hazijasomwa</a>
    <a href="{{ url_for('staff_logout') }}" class="btn-dashboard btn-logout">🚪 Logout</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
