<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Malipo Required</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body.dark-mode {
            background-color: #121212;
            color: #f5f5f5;
        }

        .card {
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .card h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .card p {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .btn {
            min-width: 150px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1><i class="bi bi-exclamation-triangle-fill text-warning"></i> Subscription Imeisha</h1>
    <p>⚠️ Muda wako wa kutumia mfumo umeisha. Tafadhali lipa ili kuendelea kutumia huduma zote za dashboard.</p>
    
    <!-- ✅ Hapa tumebadilisha route -->
    <a href="{{ url_for('subscription_payment') }}" class="btn btn-primary mb-2">
        <i class="bi bi-credit-card"></i> Lipa Sasa
    </a>

    <a href="{{ url_for('boss_logout') }}" class="btn btn-secondary">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>
</div>

<script>
    // Dark mode toggle kwa template hii ikiwa ungependa
    document.body.classList.add(localStorage.getItem('theme') || 'light');
</script>
</body>
</html>
