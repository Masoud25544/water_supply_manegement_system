<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Malipo ya Subscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            background-color: #ffffff;
        }
        .card h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        .card p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #555;
        }
        .btn {
            min-width: 150px;
            margin: 5px;
        }
        .btn-primary {
            background-color: #0d6efd;
            border: none;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
        }
        .btn-secondary {
            background-color: #6c757d;
            border: none;
        }
        .btn-secondary:hover {
            background-color: #5c636a;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1><i class="bi bi-exclamation-triangle-fill text-warning"></i> Subscription Imeisha</h1>
        <p>⚠️ Muda wako wa kutumia mfumo umeisha. Tafadhali lipa ili kuendelea kutumia dashboard.</p>

        <!-- Route mpya ya subscription payment -->
        <a href="{{ url_for('receive_subscription_payment', boss_id=boss_id) }}" class="btn btn-primary">
            <i class="bi bi-credit-card"></i> Lipa Sasa
        </a>

        <a href="{{ url_for('boss_logout') }}" class="btn btn-secondary">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</body>
</html>
