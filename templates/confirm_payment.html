<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<title>Thibitisha Malipo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Roboto',sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.payment-card{
max-width:650px;
width:100%;
border-radius:15px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

/* Header */

.card-header-custom{
background:linear-gradient(90deg,#007bff,#00c6ff);
color:white;
padding:22px;
text-align:center;
}

.card-header-custom h3{
margin:0;
font-weight:600;
}

/* Body */

.card-body-custom{
background:white;
padding:35px;
}

/* Bill info */

.bill-info{
background:#f4f8ff;
border-radius:10px;
padding:12px 15px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-left:4px solid #0d6efd;
}

.bill-info strong{
color:#495057;
}

/* Buttons */

.btn-confirm{
background:linear-gradient(90deg,#28a745,#2ecc71);
border:none;
border-radius:8px;
font-weight:500;
}

.btn-confirm:hover{
background:linear-gradient(90deg,#218838,#27ae60);
}

.btn-back{
border-radius:8px;
}

</style>
</head>

<body>

<div class="payment-card">

<div class="card-header-custom">

<h3>
<i class="bi bi-check-circle"></i>
Thibitisha Malipo
</h3>

</div>

<div class="card-body-custom">

<p class="mb-4">
Unaendelea kulipia bili ya
<strong class="text-primary">{{ bill.customer_name }}</strong>
</p>

<!-- Bill Info -->

<div class="bill-info">
<span><i class="bi bi-receipt"></i> <strong>Bill ID</strong></span>
<span>{{ bill.bill_id }}</span>
</div>

<div class="bill-info">
<span><i class="bi bi-speedometer2"></i> <strong>Meter Number</strong></span>
<span>{{ bill.meter_number or "Hakuna" }}</span>
</div>

<div class="bill-info">
<span><i class="bi bi-bar-chart"></i> <strong>Units Used</strong></span>
<span>{{ bill.units_used or 0 }}</span>
</div>

<div class="bill-info">
<span><i class="bi bi-cash-stack"></i> <strong>Kiasi</strong></span>
<span class="text-danger fw-bold">
Tsh {{ "{:,.2f}".format(bill.amount or 0) }}
</span>
</div>

<div class="bill-info">
<span><i class="bi bi-calendar"></i> <strong>Billing Month</strong></span>
<span>{{ bill.billing_month }}</span>
</div>

<!-- Additional spacing to match 170 lines if needed -->
<div style="height:10px;"></div>

<form method="POST" class="d-flex gap-3 mt-4 flex-wrap">

<button type="submit" class="btn btn-confirm text-white">

<i class="bi bi-check-circle-fill"></i>

Thibitisha Malipo

</button>

<!-- 🔹 Role-aware back button -->
<a href="{{ url_for(dashboard_route) }}" class="btn btn-dark btn-back">

<i class="bi bi-arrow-left"></i>

Rudia

</a>

</form>

<div style="height:10px;"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
