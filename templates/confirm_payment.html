<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thibitisha Malipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #d7e1ec, #f0f2f5);
            padding: 30px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            max-width: 650px;
            width: 100%;
            background: #ffffff;
            padding: 30px 35px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        h3 {
            color: #0d6efd;
            font-weight: 700;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-bottom: 30px;
        }

        li {
            margin-bottom: 12px;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
        }

        li strong {
            color: #495057;
        }

        .btn {
            min-width: 150px;
            font-weight: 500;
            border-radius: 10px;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #2ecc71);
            border: none;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #218838, #27ae60);
        }

        .btn-secondary {
            background: #6c757d;
            border: none;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        @media (max-width: 576px) {
            li {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h3>Thibitisha Malipo</h3>
    <p>Unaendelea kulipia bili ya <strong>{{ bill.customer_name }}</strong></p>

    <ul>
        <li><span><strong>Bill ID:</strong></span> <span>{{ bill.bill_id }}</span></li>
        <li><span><strong>Meter Number:</strong></span> <span>{{ bill.meter_number or "Hakuna" }}</span></li>
        <li><span><strong>Units Used:</strong></span> <span>{{ bill.units_used }}</span></li>
        <li><span><strong>Kiasi:</strong></span> <span>{{ bill.amount }}</span></li>
        <li><span><strong>Billing Month:</strong></span> <span>{{ bill.billing_month }}</span></li>
    </ul>

    <form method="POST" class="d-flex gap-3 flex-wrap">
        <button type="submit" class="btn btn-success">
            <i class="bi bi-check-circle-fill"></i> Thibitisha Malipo
        </button>
        <a href="{{ url_for('unpaid_bills') }}" class="btn btn-secondary">Rudia</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
