<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tafuta Mteja</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    display:flex;
    align-items:center;
    font-family: Arial, sans-serif;
}

.search-card{
    max-width:720px;
    margin:auto;
    border-radius:15px;
    box-shadow:0 12px 30px rgba(0,0,0,0.3);
    overflow:hidden;
}

/* Header ya card */
.card-header-custom{
    background:linear-gradient(90deg,#007bff,#00c6ff);
    color:white;
    text-align:center;
    padding:25px;
}

.card-header-custom h3{
    margin:0;
    font-weight:600;
}

/* Body ya card */
.card-body-custom{
    background:#ffffff;
    padding:40px;
}

.system-title{
    font-size:14px;
    opacity:0.9;
}

/* Input */
.form-control{
    height:50px;
    border-radius:8px;
}

/* Search button */
.btn-search{
    height:50px;
    border-radius:8px;
    font-weight:500;
}

/* Dashboard button */
.dashboard-btn{
    border-radius:8px;
}

</style>

</head>
<body>

<div class="container">

<div class="search-card">

<div class="card-header-custom">

<i class="bi bi-search fs-3"></i>

<h3>Tafuta Mteja</h3>

<div class="system-title">
Water Supply Management System
</div>

</div>

<div class="card-body-custom">

<form method="POST">

<div class="input-group mb-4">

<span class="input-group-text">
<i class="bi bi-person"></i>
</span>

<input
type="text"
name="customer_name"
class="form-control"
placeholder="Andika jina la mteja..."
required
>

<button class="btn btn-primary btn-search">
<i class="bi bi-search"></i> Tafuta
</button>

</div>

</form>

<div class="text-center">

<a href="{{ url_for('boss_dashboard') }}" class="btn btn-dark dashboard-btn">
<i class="bi bi-arrow-left"></i> Rudi Dashboard
</a>

</div>

</div>

</div>

</div>

</body>
</html>
