<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<title>Pokea Malipo</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background-color: #f0f2f5; font-family: Arial, sans-serif; }
.card { border-radius: 12px; }
.back { margin-top: 20px; text-align: center; }
</style>
</head>

<body>

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h3 class="mb-4 text-primary">Pokea Malipo ya Bill</h3>

        <!-- Bill Info -->
        <p><strong>Jina la Mteja:</strong> {{ bill.customer_name }}</p>
        <p><strong>Kiasi cha Bill:</strong> {{ "{:,.2f}".format(bill.amount) }} TZS</p>
        <p><strong>Status:</strong> {{ bill.status }}</p>

        <!-- Malipo Form -->
        <form method="POST">
            <div class="mb-3">
                <label>Kiasi Kilicholipwa</label>
                <input type="number" step="0.01" name="amount_paid" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Njia ya Malipo</label>
                <select name="payment_method" class="form-control" required>
                    <option value="Cash">Cash</option>
                    <option value="M-Pesa">M-Pesa</option>
                    <option value="Tigo Pesa">Tigo Pesa</option>
                    <option value="Airtel Money">Airtel Money</option>
                    <option value="Bank">Bank</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Reference (optional)</label>
                <input type="text" name="reference" class="form-control">
            </div>

            <button type="submit" class="btn btn-success w-100">Thibitisha Malipo</button>
        </form>

        <!-- 🔹 Back to Dashboard (ROLE-AWARE) -->
        <div class="back">
            {% if user_role == "boss" %}
                <a href="{{ url_for('boss_dashboard') }}" class="btn btn-secondary">🔙 Rudi Dashboard</a>
            {% else %}
                <a href="{{ url_for('staff_dashboard') }}" class="btn btn-secondary">🔙 Rudi Dashboard</a>
            {% endif %}
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
