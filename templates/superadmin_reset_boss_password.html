<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - {{ boss.full_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="mb-4">🔑 Reset Password ya {{ boss.full_name }}</h4>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Ingiza PIN Mpya</label>
                    <input type="password" name="new_pin" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Thibitisha PIN Mpya</label>
                    <input type="password" name="confirm_pin" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary">💾 Reset Password</button>
                <a href="{{ url_for('superadmin_boss_customers') }}" class="btn btn-secondary">⬅ Rudisha</a>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
