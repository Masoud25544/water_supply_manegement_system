<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boss Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #e0f7fa, #e8eaf6);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .signup-card {
        background: white;
        padding: 40px 30px;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 450px;
    }

    h1 {
        text-align: center;
        font-weight: 600;
        color: #0d6efd;
        margin-bottom: 30px;
    }

    .form-control:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.2rem rgba(13,110,253,.25);
    }

    .btn-primary {
        background-color: #0d6efd;
        border: none;
        font-weight: 500;
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        transition: 0.3s ease;
    }

    .btn-primary:hover {
        background-color: #0b5ed7;
    }

    .btn-secondary {
        background-color: #6c757d;
        border: none;
        font-weight: 500;
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        margin-top: 10px;
        transition: 0.3s ease;
    }

    .btn-secondary:hover {
        background-color: #5c636a;
    }

    .alert {
        border-radius: 10px;
        padding: 10px 15px;
        font-size: 14px;
    }

    .mb-3 label {
        font-weight: 500;
    }
</style>
</head>
<body>

<div class="signup-card">

    <h1>Boss Sign Up</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label>Full Name</label>
            <input type="text" class="form-control" name="full_name" placeholder="John Doe" required>
        </div>
        <div class="mb-3">
            <label>Username</label>
            <input type="text" class="form-control" name="username" placeholder="johndoe123" required>
        </div>
        <div class="mb-3">
            <label>Password</label>
            <input type="password" class="form-control" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign Up</button>
        <a href="{{ url_for('boss_login') }}" class="btn btn-secondary">Already have account? Login</a>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
