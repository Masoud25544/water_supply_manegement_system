<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer - Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #f8f9fa);
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.08);
            border: none;
        }
        .card-header {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(90deg, #0d6efd, #0b5ed7);
            color: #fff;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            padding: 15px;
        }
        .form-label {
            font-size: 0.9rem;
        }
        .btn-primary {
            min-width: 150px;
            border-radius: 8px;
        }
        .btn-secondary {
            min-width: 150px;
            border-radius: 8px;
        }
        .form-control {
            border-radius: 8px;
        }
        .form-text {
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="card mx-auto" style="max-width: 600px;">
        
        <div class="card-header text-center">
            ✏️ Edit Mteja
        </div>

        <div class="card-body">

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible fade show mt-2" role="alert">
                      {{ message }}
                      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <!-- Edit Form -->
            <form method="POST" class="mt-4">

                <!-- FULL NAME -->
                <div class="mb-3">
                    <label for="full_name" class="form-label fw-semibold">
                        Jina la Mteja
                    </label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="full_name" 
                        name="full_name" 
                        value="{{ customer.full_name }}" 
                        required
                        autofocus>
                </div>

                <!-- METER NUMBER -->
                <div class="mb-3">
                    <label for="meter_number" class="form-label fw-semibold">
                        Meter Number
                    </label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="meter_number" 
                        name="meter_number" 
                        value="{{ meter.meter_number if meter else '' }}"
                        placeholder="Weka meter number (optional)">
                    
                    <div class="form-text text-muted">
                        Badilisha hii tu kama unataka kubadilisha meter ya mteja.
                    </div>
                </div>

                <!-- BUTTONS -->
                <div class="d-flex justify-content-between mt-4">
                    <button type="submit" class="btn btn-primary">
                        💾 Update Mteja
                    </button>

                    <a href="{{ url_for('boss_dashboard') }}" class="btn btn-secondary">
                        ⬅ Rudi Dashboard
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
