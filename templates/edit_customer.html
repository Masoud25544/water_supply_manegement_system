<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Customer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1>Edit Mteja</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} mt-2">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="mt-4">
        <div class="mb-3">
            <label for="full_name" class="form-label">Jina la Mteja</label>
            <input type="text" class="form-control" id="full_name" name="full_name" value="{{ customer.full_name }}" required>
        </div>
        <div class="mb-3">
            <label for="meter_number" class="form-label">Meter Number</label>
            <input type="text" class="form-control" id="meter_number" name="meter_number" value="{{ customer.meter_number }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Update Mteja</button>
        <a href="{{ url_for('boss_dashboard') }}" class="btn btn-secondary">Rudi Dashboard</a>
    </form>
</div>
</body>
</html>
