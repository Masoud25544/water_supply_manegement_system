<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuma Tangazo kwa Maboss</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f5f5;
            padding: 40px 0;
        }
        .container {
            max-width: 700px;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card-header {
            font-weight: bold;
            font-size: 1.4rem;
            background-color: #0d6efd;
            color: #fff;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-primary {
            min-width: 120px;
        }
        .btn-back {
            background-color: #6c757d;
            color: #fff;
        }
        .btn-back:hover {
            background-color: #5c636a;
            color: #fff;
        }
        textarea {
            resize: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4">
        <div class="card-header mb-3">
            <span><i class="bi bi-bullhorn-fill"></i> Tuma Tangazo kwa Maboss</span>
            <a href="{{ url_for('superadmin_dashboard') }}" class="btn btn-back btn-sm">
                <i class="bi bi-arrow-left"></i> Kurudi
            </a>
        </div>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label for="title" class="form-label">Kichwa cha Tangazo</label>
                <input type="text" class="form-control" id="title" name="title" placeholder="Weka kichwa cha tangazo" required>
            </div>

            <div class="mb-3">
                <label for="message" class="form-label">Ujumbe</label>
                <textarea class="form-control" id="message" name="message" rows="6" placeholder="Andika ujumbe wa tangazo kwa maboss" required></textarea>
            </div>

            <div class="d-flex justify-content-end">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-send-fill"></i> Tuma Tangazo
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
