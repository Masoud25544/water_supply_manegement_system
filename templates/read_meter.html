<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Soma Meter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            width: 370px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .meter-icon {
            width: 80px;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 20px;
            color: #0d6efd;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #d0d7e2;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s ease;
        }

        input:focus {
            border-color: #0d6efd;
            outline: none;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .flash {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .success { background-color: #d1e7dd; color: #0f5132; }
        .danger { background-color: #f8d7da; color: #842029; }
        .warning { background-color: #fff3cd; color: #664d03; }

        .back {
            margin-top: 18px;
        }

        .back a {
            text-decoration: none;
            color: #0d6efd;
            font-weight: 500;
        }

        .back a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Meter SVG Icon -->
    <svg class="meter-icon" viewBox="0 0 24 24" fill="none" stroke="#0d6efd" stroke-width="1.5">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 12l4-4"/>
        <circle cx="12" cy="12" r="2" fill="#0d6efd"/>
    </svg>

    <h2>Soma Meter</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="meter_number" placeholder="Meter Number" required>
        <input type="number" step="0.01" name="current_reading" placeholder="Current Reading" required>
        <button type="submit">Soma Meter</button>
    </form>

    <div class="back">
        <a href="{{ url_for('boss_dashboard') }}">🔙 Rudi Dashboard</a>
    </div>
</div>

</body>
</html>
