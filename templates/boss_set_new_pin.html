<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weka PIN Mpya</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <h4 class="mb-4 text-center">🔑 Weka PIN Mpya</h4>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Ingiza PIN Mpya</label>
                    <input type="password" name="new_pin" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Thibitisha PIN Mpya</label>
                    <input type="password" name="confirm_pin" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">💾 Thibitisha PIN</button>
                <a href="{{ url_for('boss_logout') }}" class="btn btn-secondary w-100 mt-2">⬅ Logout</a>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
