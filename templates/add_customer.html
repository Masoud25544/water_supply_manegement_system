<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sajiri Mteja Mpya</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* Body Gradient Background */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #6dd5fa, #2980b9); /* blue gradient */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Card Styling */
        .card {
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .card-header {
            background: linear-gradient(90deg, #ff7e5f, #feb47b); /* warm gradient */
            color: #fff;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            font-weight: 600;
        }

        /* Form Elements */
        input.form-control {
            border-radius: 10px;
            border: 1px solid #ddd;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input.form-control:focus {
            border-color: #ff7e5f;
            box-shadow: 0 0 8px rgba(255,126,95,0.3);
        }

        .btn-primary {
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            border: none;
            min-width: 150px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,126,95,0.4);
        }

        .btn-secondary {
            background: #95a5a6;
            border: none;
            min-width: 150px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .form-label span {
            font-weight: bold;
        }

        .alert {
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="card shadow-lg">
    <div class="card-header d-flex align-items-center">
        <i class="bi bi-person-plus-fill me-2"></i> Sajiri Mteja Mpya
    </div>
    <div class="card-body">

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Customer Registration Form -->
        <form method="POST">
            <div class="mb-3">
                <label for="full_name" class="form-label">Jina Kamili <span class="text-danger">*</span></label>
                <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Andika jina kamili" required>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Namba ya Simu <i class="bi bi-telephone-fill"></i></label>
                <input type="text" id="phone" name="phone" class="form-control" placeholder="0712 345 678">
            </div>

            <div class="mb-3">
                <label for="area" class="form-label">Eneo <i class="bi bi-geo-alt-fill"></i></label>
                <input type="text" id="area" name="area" class="form-control" placeholder="Mfano: Sinza, Dar es Salaam">
            </div>

            <div class="mb-3">
                <label for="house_number" class="form-label">Namba ya Nyumba <i class="bi bi-house-fill"></i></label>
                <input type="text" id="house_number" name="house_number" class="form-control" placeholder="Mfano: 12A">
            </div>

            <div class="mb-3">
                <label for="meter_number" class="form-label">Namba ya Meter <span class="text-danger">*</span> <i class="bi bi-speedometer2"></i></label>
                <input type="text" id="meter_number" name="meter_number" class="form-control" placeholder="Mfano: 564" required>
            </div>

            <div class="d-flex justify-content-between mt-4 flex-wrap gap-2">
                <a href="{{ url_for('boss_dashboard') }}" class="btn btn-secondary"><i class="bi bi-arrow-left-circle"></i> Rudi Dashboard</a>
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Sajiri Mteja</button>
            </div>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
